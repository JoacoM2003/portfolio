{% load static %}
<!DOCTYPE html>
<html lang="en"></html>

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %} - Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&family=Rufina:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'styles.css' %}">
</head>

<body>
    <header>
        <div class="logo">JOAQUIN MUÑOZ</div>
        <nav>
            <ul>
                <li><a href="{% url 'index' %}">Home</a></li>
            </ul>
        </nav>
    </header>
    <section>{% block content %}{% endblock %}</section>
    <footer>
        <div class="center full-width">
            <div class="row">
                <h3>Contact</h3>
            </div>
        </div>
        <div class="center full-width">
            <div class="row">
                <p>Redes sociales</p>
            </div>
        </div>
        <div class="center full-width social-links">
            <div class="row">
                <a href="#"><img src="{% static 'linkedin.png' %}" class="social" width="30"></a>
                <a href="#"><img src="{% static 'linkedin.png' %}" class="social" width="30"></a>
                <a href="#"><img src="{% static 'linkedin.png' %}" class="social" width="30"></a>
            </div>
        </div>
        <div class="made-with">
            <div class="row">
                <p>Hecho con ❤️ por <a target="_blank" href="https://github.com/">Joaquin Muñoz</a></p>
            </div>
        </div>
    </footer>
